name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}

      # -----------------
      # FRONTEND (Next.js)
      # -----------------
      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      # -----------------
      # BACKEND (Node.js)
      # -----------------
      - name: Install backend dependencies
        working-directory: ./backend
        run: npm install

      - name: Run backend tests
        working-directory: ./backend
        run: npm test

      # -----------------
      # OPTIONAL: Linting
      # -----------------
      - name: Lint frontend
        working-directory: ./frontend
        run: npm run lint --if-present

      - name: Lint backend
        working-directory: ./backend
        run: npm run lint --if-present

      # -----------------
      # OPTIONAL: Build backend (if needed)
      # -----------------
      - name: Build backend
        working-directory: ./backend
        run: npm run build --if-present
